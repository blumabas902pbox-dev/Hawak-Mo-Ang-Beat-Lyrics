<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 10: Song Toggle</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            animation: rainbowBackground 20s infinite linear;
            transition: background-color 0.5s ease;
        }

        @keyframes rainbowBackground {
            0%   { background-color: #2d2d2d; }
            10%   { background-color: #f7f7f7; }
            20%  { background-color: #ffadad; }
            40%  { background-color: #ffd6a5; }
            50%  { background-color: #fdffb6; }
            60%  { background-color: #caffbf; }
            70%  { background-color: #9bf6ff; }
            80%  { background-color: #bdb2ff; }
            90%  { background-color: #ffc6ff; }
            100% { background-color: #2d2d2d; }
        }

        #title {
            padding: 20px 40px;
            background: #f7f7f7;
            backdrop-filter: blur(5px);
            border-radius: 10px;
            box-shadow: 0 5px 10px bisque;
            min-width: 320px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #2d2d2d;
        }

        #title.active {
            color: #4a4e69;
            transform: translateY(-5px);
            background: #f7f7f7;
        }

        button {
            margin-top: 30px;
            padding: 14px 28px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            background-color: #2d2d2d;
            color: #f2f2f2;
            box-shadow: 0 5px 10px bisque;
            transition: all 0.3s ease;
            outline: none;
        }

        button:hover {
            background-color: #4a4e69;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px bisque;
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="Hawak Mo Ang Beat © DJ Mogo (Official Release).mp3" type="audio/mpeg">
    </audio>

    <h1 id="title">Hawak Mo Ang Beat</h1>
    <button id="toggleBtn">Play Now</button>

    <script>
        const titleElement = document.getElementById("title");
        const btnElement = document.getElementById("toggleBtn");
        const music = document.getElementById("bgMusic");

        const originalText = "Hawak Mo Ang Beat";
        //I mean put a synced lyrics here or below with an animation scroll upward and bold text like spotify.
        const newText = "Lyrics Here";

        btnElement.addEventListener('click', () => {
            
            titleElement.classList.toggle('active');

            if (titleElement.classList.contains('active')) {
                titleElement.textContent = newText;
                btnElement.textContent = "Stop Music";
                
                music.play().catch(e => console.log("Audio playback requires interaction first."));
            } else {
                titleElement.textContent = originalText;
                btnElement.textContent = "Play Now";

                music.pause();
                music.currentTime = 0; 
            }
        });
    </script>
</body>
</html>
